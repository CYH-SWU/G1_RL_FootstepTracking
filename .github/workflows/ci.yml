name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # 允许手动触发
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies (MuJoCo headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libgl1-mesa-glx \
            libglew-dev \
            libosmesa6-dev \
            libglfw3 \
            libglfw3-dev \
            xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install ruff pytest-cov

      - name: Set up MuJoCo headless rendering
        run: |
          export MUJOCO_GL=egl
          echo "MUJOCO_GL=egl" >> $GITHUB_ENV

      - name: Run import tests
        run: pytest tests/test_imports.py -v

      - name: Run environment tests
        run: pytest tests/test_env.py -v --cov=env --cov-report=term

      - name: Run policy tests
        run: pytest tests/test_policy.py -v --cov=rl --cov-report=term

      - name: Run all tests with coverage
        run: |
          pytest tests/ -v --cov=env --cov=rl --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false